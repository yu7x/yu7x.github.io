<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全単語りすと</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .hidden-meaning { 
      background-color: #FF9999 !important; 
      color: #FF9999 !important; 
      user-select: none;
    }
    .hidden-meaning * { color: #FF9999 !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="icon.png" alt="アイコン" class="w-10 h-10 object-contain">
        <h1 class="text-2xl sm:text-3xl font-bold text-indigo-700">しすたん±</h1>
      </div>
      <div class="flex gap-6 sm:gap-10 text-base sm:text-lg font-medium">
        <a href="index.html" class="hover:text-indigo-600">ホーム</a>
        <a href="all.html" class="text-indigo-600 font-bold">全単語</a>
        <a href="test.html" class="hover:text-indigo-600">小テスト</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">

    <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-6 items-start sm:items-center justify-between">
      <input id="search" type="text" placeholder="単語・意味で検索..." 
             class="w-full sm:flex-1 px-5 py-3 rounded-xl border focus:border-indigo-500 text-base sm:text-lg">
      
      <button id="redSheetBtn" onclick="toggleRedSheet()"
              class="w-full sm:w-auto px-6 py-3 bg-red-100 text-red-700 font-medium rounded-xl hover:bg-red-200 transition flex items-center justify-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> 赤シート ON
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead class="bg-indigo-50 sticky top-0">
          <tr>
            <th class="py-4 px-4 sm:px-6 w-12 sm:w-16 text-center">✓</th>
            <th class="py-4 px-4 sm:px-6 w-20 sm:w-24">No.</th>
            <th class="py-4 px-4 sm:px-6">英単語</th>
            <th class="py-4 px-4 sm:px-6 meaning-col">意味</th>
          </tr>
        </thead>
        <tbody id="wordTable" class="divide-y"></tbody>
      </table>
    </div>

    <div class="mt-6 text-right text-sm text-gray-500">
      チェックした単語だけ小テストに使いたい場合は、test.html を拡張してくださいね♪
    </div>
  </div>

  <script>
    let words = [];
    let isRedSheetOn = false;

    fetch('data/words.csv')
      .then(r => r.text())
      .then(csv => {
        Papa.parse(csv, {
          header: true,
          skipEmptyLines: true,
          complete: result => {
            words = result.data.map(w => ({
              no: parseInt(w.No),
              word: (w.Word || '').trim(),
              meaning: (w.Meaning || '').trim()
            })).filter(w => w.word && w.meaning);
            renderTable(words);
          }
        });
      });

    function renderTable(data) {
      const tbody = document.getElementById('wordTable');
      tbody.innerHTML = data.map(w => `
        <tr class="hover:bg-indigo-50/50 transition">
          <td class="py-4 px-4 sm:px-6 text-center">
            <input type="checkbox" class="w-5 h-5 accent-indigo-600">
          </td>
          <td class="py-4 px-4 sm:px-6 font-mono text-indigo-700">${w.no}</td>
          <td class="py-4 px-4 sm:px-6 text-lg font-medium cursor-pointer" onclick="speak('${w.word.replace(/'/g,"\\\'")}')">
            ${w.word}
          </td>
          <td class="py-4 px-4 sm:px-6 meaning-col text-gray-800 text-base">
            ${w.meaning}
          </td>
        </tr>
      `).join('');
      
      if (isRedSheetOn) applyRedSheet();
    }

    function toggleRedSheet() {
      isRedSheetOn = !isRedSheetOn;
      const btn = document.getElementById('redSheetBtn');
      btn.innerHTML = isRedSheetOn 
        ? '<i class="fa-solid fa-eye"></i> 赤シート OFF' 
        : '<i class="fa-solid fa-eye-slash"></i> 赤シート ON';
      btn.classList.toggle('bg-green-100', isRedSheetOn);
      btn.classList.toggle('text-green-700', isRedSheetOn);
      btn.classList.toggle('hover:bg-green-200', isRedSheetOn);
      applyRedSheet();
    }

    function applyRedSheet() {
      document.querySelectorAll('.meaning-col').forEach(cell => {
        if (isRedSheetOn) {
          cell.classList.add('hidden-meaning');
        } else {
          cell.classList.remove('hidden-meaning');
        }
      });
    }

    // 検索機能
    document.getElementById('search').addEventListener('input', e => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = words.filter(w => 
        !term || 
        w.word.toLowerCase().includes(term) || 
        w.meaning.toLowerCase().includes(term)
      );
      renderTable(filtered);
    });

    function speak(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      speechSynthesis.speak(u);
    }
  </script>
</body>
</html>
