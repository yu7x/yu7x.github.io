<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単語りすと</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .red-text { color: #FF9999 !important; }
    .meaning-col, .word-col { transition: color 0.2s; }
    audio { width: 100px; height: 28px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="icon.png" alt="アイコン" class="w-10 h-10 object-contain">
        <h1 class="text-2xl sm:text-3xl font-bold text-indigo-700">しすたん±</h1>
      </div>
      <div class="flex gap-6 sm:gap-10 text-base sm:text-lg font-medium">
        <a href="index.html" class="hover:text-indigo-600">ホーム</a>
        <a href="all.html" class="text-indigo-600 font-bold">全単語</a>
        <a href="test.html" class="hover:text-indigo-600">小テスト</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">

    <!-- 検索 + 赤シート -->
    <div class="flex flex-col gap-4 mb-6">

      <input id="search" type="text" placeholder="単語・意味で検索..."
             class="w-full px-5 py-3 rounded-xl border focus:border-indigo-500 text-base sm:text-lg">

      <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center flex-wrap">
        <div class="flex gap-4 items-center">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="hideTarget" value="meaning" checked class="accent-indigo-600">
            意味
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="hideTarget" value="word" class="accent-indigo-600">
            英単語
          </label>
        </div>

        <button id="redSheetBtn" onclick="toggleRedSheet()"
                class="px-6 py-3 bg-red-100 text-red-700 font-medium rounded-xl hover:bg-red-200 transition flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-eye-slash"></i> 赤シート ON
        </button>

        <button id="checkedOnlyBtn" onclick="toggleCheckedOnly()"
                class="px-6 py-3 bg-purple-100 text-purple-700 font-medium rounded-xl hover:bg-purple-200 transition flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-check-square"></i> チェックのみ表示
        </button>
      </div>

      <!-- 新しいフィルターボックス -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">開始 No.</label>
          <input id="startNo" type="number" min="1" placeholder="例: 1" class="w-full px-4 py-2 rounded-xl border">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">終了 No.</label>
          <input id="endNo" type="number" min="1" placeholder="例: 200" class="w-full px-4 py-2 rounded-xl border">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">開始単語 (A-から)</label>
          <input id="startWord" type="text" placeholder="例: abandon" class="w-full px-4 py-2 rounded-xl border">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">終了単語 (まで)</label>
          <input id="endWord" type="text" placeholder="例: increase" class="w-full px-4 py-2 rounded-xl border">
        </div>
      </div>

      <button onclick="applyFilters()" class="w-full sm:w-auto px-8 py-3 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 transition">
        フィルタ適用
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow overflow-x-auto">
      <table class="w-full text-left border-collapse min-w-[600px]">
        <thead class="bg-indigo-50 sticky top-0">
          <tr>
            <th class="py-4 px-4 sm:px-6 w-12 sm:w-16 text-center">✓</th>
            <th class="py-4 px-4 sm:px-6 w-20 sm:w-24">No.</th>
            <th class="py-4 px-4 sm:px-6 word-col">英単語</th>
            <th class="py-4 px-4 sm:px-6 meaning-col">意味</th>
            <th class="py-4 px-4 sm:px-6 w-24 text-center">音声</th>
          </tr>
        </thead>
        <tbody id="wordTable" class="divide-y"></tbody>
      </table>
    </div>
  </div>

 <script>
  let words = [];
  let displayedWords = [];
  let isRedSheetOn = false;
  let hideTarget = 'meaning';
  let checkedOnly = false;
  let checkedNos = JSON.parse(localStorage.getItem('sys-tan-checked')) || [];

  fetch('data/words.csv')
    .then(r => r.text())
    .then(csv => {
      Papa.parse(csv, {
        header: true,
        skipEmptyLines: true,
        complete: result => {
          words = result.data.map(w => ({
            no: parseInt(w.No),
            word: (w.Word || '').trim(),
            meaning: (w.Meaning || '').trim()
          })).filter(w => w.word && w.meaning && !isNaN(w.no));

          // No.でソート（念のため）
          words.sort((a,b) => a.no - b.no);

          displayedWords = [...words];
          renderTable(displayedWords);
          restoreChecks();  // テーブル描画後に復元
        }
      });
    });

  function renderTable(data) {
    const tbody = document.getElementById('wordTable');
    if (data.length === 0 && checkedOnly) {
      tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-gray-500 text-lg">
        チェック済みの単語がありません。チェックを入れてみてください！
      </td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(w => `
      <tr class="hover:bg-indigo-50/50 transition">
        <td class="py-4 px-4 sm:px-6 text-center">
          <input type="checkbox" data-no="${w.no}" class="w-5 h-5 accent-indigo-600" 
                 onchange="toggleCheck(this, ${w.no})">
        </td>
        <td class="py-4 px-4 sm:px-6 font-mono text-indigo-700">${w.no}</td>
        <td class="py-4 px-4 sm:px-6 word-col text-lg font-medium">${w.word}</td>
        <td class="py-4 px-4 sm:px-6 meaning-col text-base text-gray-800">${w.meaning}</td>
        <td class="py-4 px-4 sm:px-6 text-center">
          <audio controls preload="none">
            <source src="https://api.dictionaryapi.dev/media/pronunciations/en/${w.word.toLowerCase()}-us.mp3" type="audio/mpeg">
            <source src="https://api.dictionaryapi.dev/media/pronunciations/en/${w.word.toLowerCase()}-uk.mp3" type="audio/mpeg">
            音声非対応
          </audio>
        </td>
      </tr>
    `).join('');

    // 描画後にチェック状態を復元（重要！）
    restoreChecks();
    applyRedSheet();
  }

  function toggleCheck(checkbox, no) {
    if (checkbox.checked) {
      if (!checkedNos.includes(no)) {
        checkedNos.push(no);
      }
    } else {
      checkedNos = checkedNos.filter(n => n !== no);
    }
    localStorage.setItem('sys-tan-checked', JSON.stringify([...new Set(checkedNos)])); // 重複除去
    console.log('保存済みチェック:', checkedNos); // デバッグ用
  }

  function restoreChecks() {
    document.querySelectorAll('input[type="checkbox"][data-no]').forEach(chk => {
      const no = parseInt(chk.dataset.no);
      chk.checked = checkedNos.includes(no);
    });
    console.log('復元済みチェック数:', checkedNos.length);
  }

  // 赤シート関連（変更なし）
  function toggleRedSheet() { /* ... 元のコードそのまま ... */ }
  function applyRedSheet() { /* ... 元のコードそのまま ... */ }

  document.querySelectorAll('input[name="hideTarget"]').forEach(radio => {
    radio.addEventListener('change', e => {
      hideTarget = e.target.value;
      applyRedSheet();
    });
  });

  function toggleCheckedOnly() {
    checkedOnly = !checkedOnly;
    const btn = document.getElementById('checkedOnlyBtn');
    btn.innerHTML = checkedOnly 
      ? '<i class="fa-solid fa-square"></i> チェック済みのみ表示 OFF' 
      : '<i class="fa-solid fa-check-square"></i> チェック済みのみ表示';
    btn.classList.toggle('bg-purple-200', checkedOnly);
    applyFilters();
  }

  function applyFilters() {
    let filtered = [...words];

    const term = document.getElementById('search').value.toLowerCase().trim();
    if (term) {
      filtered = filtered.filter(w => 
        w.word.toLowerCase().includes(term) || w.meaning.toLowerCase().includes(term)
      );
    }

    let effectiveStartNo = 0;
    let effectiveEndNo = Infinity;

    const inputStartNo = parseInt(document.getElementById('startNo').value);
    const inputEndNo   = parseInt(document.getElementById('endNo').value);

    if (!isNaN(inputStartNo)) effectiveStartNo = inputStartNo;
    if (!isNaN(inputEndNo))   effectiveEndNo   = inputEndNo;

    const startWord = document.getElementById('startWord').value.trim().toLowerCase();
    const endWord   = document.getElementById('endWord').value.trim().toLowerCase();

    if (startWord) {
      const found = words.find(w => w.word.toLowerCase() === startWord);
      if (found) effectiveStartNo = found.no;
    }

    if (endWord) {
      const found = words.find(w => w.word.toLowerCase() === endWord);
      if (found) effectiveEndNo = found.no;
    }

    if (effectiveStartNo > 0 || effectiveEndNo < Infinity) {
      filtered = filtered.filter(w => w.no >= effectiveStartNo && w.no <= effectiveEndNo);
    }

    if (checkedOnly) {
      filtered = filtered.filter(w => checkedNos.includes(w.no));
    }

    displayedWords = filtered;
    renderTable(filtered);
  }

  document.getElementById('search').addEventListener('input', applyFilters);
</script>
</body>
</html>
