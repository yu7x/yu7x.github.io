<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全単語りすと</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body{font-family:'Noto Sans JP',sans-serif;}</style>
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="icon.png" alt="アイコン" class="w-11 h-11 object-contain">
        <h1 class="text-3xl font-bold text-indigo-700">シス単マスター</h1>
      </div>
      <div class="flex gap-10 text-lg font-medium">
        <a href="index.html" class="hover:text-indigo-600">ホーム</a>
        <a href="all.html" class="text-indigo-600 font-bold">全単語</a>
        <a href="test.html" class="hover:text-indigo-600">小テスト</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="search" type="text" placeholder="単語・意味・ページで検索..." 
             class="flex-1 px-6 py-4 rounded-2xl border focus:border-indigo-500 text-lg">
      
      <select id="pageFilter" class="px-6 py-4 rounded-2xl border text-lg">
        <option value="">全ページ</option>
      </select>
    </div>

    <table class="w-full bg-white rounded-3xl overflow-hidden shadow">
      <thead class="bg-indigo-50">
        <tr>
          <th class="py-5 px-6 text-left w-20">No.</th>
          <th class="py-5 px-6 text-left">英単語</th>
          <th class="py-5 px-6 text-left">意味</th>
          <th class="py-5 px-6 text-center w-28">ページ</th>
        </tr>
      </thead>
      <tbody id="wordTable" class="divide-y"></tbody>
    </table>
  </div>

  <script>
    let words = [];
    let allPages = new Set();

    fetch('data/words.csv')
      .then(r => r.text())
      .then(csv => {
        Papa.parse(csv, {
          header: true,
          skipEmptyLines: true,
          complete: result => {
            words = result.data.map(w => ({
              no: parseInt(w.No),
              word: w.Word.trim(),
              meaning: w.Meaning.trim(),
              page: parseInt(w.Page) || Math.ceil(parseInt(w.No)/100)
            })).filter(w => w.word && w.meaning);

            // ページ一覧作成
            words.forEach(w => allPages.add(w.page));
            const select = document.getElementById('pageFilter');
            [...allPages].sort((a,b)=>a-b).forEach(p => {
              const opt = document.createElement('option');
              opt.value = p;
              opt.textContent = `ページ ${p}`;
              select.appendChild(opt);
            });

            renderTable(words);
          }
        });
      });

    function renderTable(data) {
      const tbody = document.getElementById('wordTable');
      tbody.innerHTML = data.map(w => `
        <tr class="hover:bg-indigo-50 transition cursor-pointer" onclick="speak('${w.word}')">
          <td class="py-5 px-6 font-mono text-indigo-600">${w.no}</td>
          <td class="py-5 px-6 text-xl font-semibold">${w.word}</td>
          <td class="py-5 px-6 text-gray-700">${w.meaning}</td>
          <td class="py-5 px-6 text-center">
            <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold">${w.page}</span>
          </td>
        </tr>
      `).join('');
    }

    // 検索＋ページフィルタ
    document.getElementById('search').addEventListener('input', filterTable);
    document.getElementById('pageFilter').addEventListener('change', filterTable);

    function filterTable() {
      const term = document.getElementById('search').value.toLowerCase();
      const page = document.getElementById('pageFilter').value;
      
      const filtered = words.filter(w => {
        const matchSearch = !term || 
          w.word.toLowerCase().includes(term) || 
          w.meaning.toLowerCase().includes(term) ||
          String(w.page).includes(term);
        const matchPage = !page || w.page == page;
        return matchSearch && matchPage;
      });
      
      renderTable(filtered);
    }

    function speak(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      speechSynthesis.speak(u);
    }
  </script>
</body>
</html>
