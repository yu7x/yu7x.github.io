<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しすたん±</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
    }
    /* ナビの文字が改行されにくくする */
    nav .flex {
      white-space: nowrap;
    }
    nav a {
      white-space: nowrap;
    }
    /* スマホ対応 */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.8rem; /* スマホで見やすいサイズ */
        line-height: 1.25;
      }
      .hero-subtitle {
        font-size: 1.3rem;
      }
      .btn {
        font-size: 1.3rem;
        padding: 1.25rem 2rem;
        min-height: 64px;
      }
      nav .text-lg {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ナビゲーション -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="icon.png" alt="アイコン" class="w-11 h-11 object-contain">
        <h1 class="text-3xl font-bold text-indigo-700">しすたん±</h1>
      </div>
      <div class="flex gap-10 text-lg font-medium">
        <a href="all.html" class="hover:text-indigo-600 transition">単語りすと</a>
        <a href="test.html" class="hover:text-indigo-600 transition">小てすと</a>
      </div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <div class="max-w-6xl mx-auto px-6 py-16 sm:py-20 text-center">
    <h2 class="hero-title text-5xl sm:text-6xl font-bold mb-6 leading-tight">
      システム英単語<br>おすすめは1時間前漬け
    </h2>
    <p class="hero-subtitle text-xl sm:text-2xl text-gray-600 mb-12">
      完全無料広告なしの学生用
    </p>

    <div class="flex flex-col sm:flex-row justify-center gap-6 sm:gap-8">
      <a href="all.html" class="btn bg-white text-indigo-700 border-2 border-indigo-600 font-bold px-12 py-6 rounded-3xl text-2xl hover:bg-indigo-50 transition">
        単語りすと
      </a>
      <a href="test.html" class="btn bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold px-12 py-6 rounded-3xl text-2xl hover:scale-105 transition">
        小てすと
      </a>
    </div>
  </div>

</body>
</html>
