<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>しすたん±</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- PWA対応（アドレスバー隠し強化） -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="しすたん±">

  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    /* ナビの文字が改行されにくく */
    nav .flex { white-space: nowrap; }
    nav a { white-space: nowrap; }
    
    /* スマホでタイトルを調整（改行を自然にしつつ小さく） */
    @media (max-width: 768px) {
      .logo-text { display: none; }
      nav .flex { justify-content: space-between; }
      nav a { font-size: 1rem; }

      .hero-title {
        font-size: 2.25rem; /* スマホで小さめに（text-5xlより抑える） */
        line-height: 1.3;
        word-break: break-all; /* 長い日本語でも無理やり改行せず自然に */
        hyphens: auto;
        max-width: 95%; /* 画面幅に収まるように */
        margin-left: auto;
        margin-right: auto;
      }
      .hero-subtitle { font-size: 1.125rem; }
      .btn { font-size: 1.125rem; padding: 1rem 1.5rem; min-height: 56px; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ナビ -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="icon.png" alt="アイコン" class="w-11 h-11 object-contain">
        <h1 class="text-3xl font-bold text-indigo-700 logo-text">しすたん±</h1>
      </div>
      <div class="flex gap-8 text-lg font-medium">
        <a href="all.html" class="hover:text-indigo-600 transition">単語りすと</a>
        <a href="test.html" class="hover:text-indigo-600 transition">小りすと</a>
      </div>
    </div>
  </nav>

  <!-- メイン -->
  <div class="max-w-6xl mx-auto px-6 py-16 sm:py-20 text-center">
    <h2 class="hero-title text-5xl sm:text-6xl font-bold mb-6 leading-tight">
      シス単勉強<br>おすすめは<br>1時間前漬け
    </h2>
    <p class="hero-subtitle text-xl sm:text-2xl text-gray-600 mb-12">
      学生用完全無料広告なし
    </p>

    <div class="flex flex-col sm:flex-row justify-center gap-6 sm:gap-8">
      <a href="all.html" class="btn bg-white text-indigo-700 border-2 border-indigo-600 font-bold px-10 py-6 rounded-3xl text-2xl hover:bg-indigo-50 transition">
        単語りすと
      </a>
      <a href="test.html" class="btn bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold px-10 py-6 rounded-3xl text-2xl hover:scale-105 transition">
        小てすと
      </a>
    </div>
  </div>

</body>
</html>
