<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>しすたん±</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- PWA対応 -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="しすたん±">

  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    nav .flex { white-space: nowrap; }
    nav a { white-space: nowrap; }

    /* スマホでロゴ文字を隠す（メディアクエリ） */
    @media (max-width: 768px) {
      .logo-text { display: none !important; }
      nav .flex { justify-content: space-between; gap: 8px; }
      nav a { font-size: 0.95rem; white-space: nowrap; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ナビ -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="icon.png" alt="アイコン" class="w-11 h-11 object-contain">
        <h1 class="text-3xl font-bold text-indigo-700 logo-text">しすたん±</h1>
      </div>
      <div class="flex gap-10 text-lg font-medium">
        <a href="all.html" class="hover:text-indigo-600 transition">単語りすと</a>
        <a href="test.html" class="hover:text-indigo-600 transition">小てすと</a>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-20 text-center">
    <h2 class="text-6xl font-bold mb-6">システム英単語<br>おすすめは1時間前漬け</h2>
    <p class="text-2xl text-gray-600 mb-12">完全無料広告なしの学生用</p>
    
    <div class="flex justify-center gap-8">
      <a href="all.html" class="bg-white text-indigo-700 border-2 border-indigo-600 font-bold px-12 py-6 rounded-3xl text-2xl hover:bg-indigo-50 transition">単語リスト</a>
      <a href="test.html" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold px-12 py-6 rounded-3xl text-2xl hover:scale-105 transition">小テスト</a>
    </div>
  </div>

  <!-- スマホでロゴ文字を強制的に隠す（PWAモード対応） -->
  <script>
    function hideLogoOnMobile() {
      const logo = document.querySelector('.logo-text');
      if (logo) {
        // 画面幅が狭い OR PWA/standaloneモードなら隠す
        if (window.innerWidth <= 768 || window.matchMedia('(display-mode: standalone)').matches) {
          logo.style.display = 'none';
        }
      }
    }

    // 複数タイミングで実行（確実に隠す）
    window.addEventListener('load', hideLogoOnMobile);
    window.addEventListener('resize', hideLogoOnMobile);
    window.addEventListener('DOMContentLoaded', hideLogoOnMobile);
    // PWA起動直後に再確認
    setTimeout(hideLogoOnMobile, 500);
  </script>
</body>
</html>
